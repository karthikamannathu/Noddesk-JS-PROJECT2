<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Notes Project2</title>
    <link rel="stylesheet" href="./style.css">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<body>
    
    <section class="main-flex">
        <section class="left_section">
            <section class="head_section_left">
                <div class="main-head">
                    <h3><img src="./notebook.png" alt="img" width="26px" height="24px" style="color: blue;">CookieNotes</h3>
                    <button class="add-notes-btn" id="add-notes-btn">+</button>
                </div>
                <div class="serch-bar">
                    <input type="text" placeholder=" 🔎 Search title & content.." id="search-input">
                </div>
                <div class="toggle">
                    <button class="btn-toggles" id="btn-notes">My Notes</button>
                    <button  class="btn-toggles"  id="btn-trash">Trash</button>
                </div>
            </section>

            <section class="list_cards_section">

            <div class="no-notes">No notes yet.</div>
            <div id ="note-cards-list" class="list"></div>
                <!-- notes cards -->
              <div id="trash-cards-list" class="list"></div>
   
            </section>

            <section class="cookie-storage">
                <div class="flex-box">
                    <label for="text">cookie-storage</label>
                     <div id="storage_count">0%</div>
                </div>
                <div class="greenbox"></div>
            </section>

        </section>

        <section class="right_section">

            <section class="head_section_right">
            <div class="save-time"></div>

            <div class="icon">
            <i class="bi bi-trash3" style="color: grey;"></i><i class="bi bi-bookmark" style="color: grey; "></i>
            </div>
            <div class='btn_flex' id="btns">
                <button class='restore btn'>Restore</button> 
                <button class='delete btn'>Delete Forever</button>
            </div>
            </section>

            <section class="notes-write-pannel">
                <div class="placeholder">
                    <icon><img src="./edit.png" alt="edit" width="30px"></icon><p>Select a note to view or create a new one</p>
                </div>
               <div class="input-condiner"></div>
              <div class="optacitybox input_cover" style="display: none;" ></div>
            </section>
           
            <section class="words-view" style="display:none;">0 words</section>            
        </section>

  <!-- main scetion close -->
    </section>


    <script src="./script.js"></script>
    
</body>
</html>
